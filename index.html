<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>AR Rolls-Royce · Alterax</title>
<!-- A-Frame + AR.js (no marker mode, uses camera + gyro) -->
<script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
<script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;font-family:system-ui,sans-serif;touch-action:none}

/* GATE */
#gate{position:fixed;inset:0;z-index:9999;background:#050507;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0;overflow:hidden;transition:opacity .6s}
#gate.hide{opacity:0;pointer-events:none}
#gg{position:absolute;inset:0;background-image:linear-gradient(rgba(232,161,90,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(232,161,90,.03) 1px,transparent 1px);background-size:52px 52px}
#gc{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;gap:6px;padding:28px 20px}
#car-svg{width:min(300px,86vw);height:auto;margin-bottom:24px;opacity:0;animation:fu 1s ease .3s forwards}
.ge{font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:rgba(232,161,90,.55);margin-bottom:10px;opacity:0;animation:fu .8s ease .9s forwards}
.gt{font-size:clamp(30px,9vw,54px);font-weight:300;color:#F4F2EC;letter-spacing:-.025em;line-height:1.05;text-align:center;margin-bottom:4px;opacity:0;animation:fu .8s ease 1s forwards}
.gs{font-size:12px;color:rgba(255,255,255,.28);margin-bottom:28px;opacity:0;animation:fu .8s ease 1.1s forwards}
#crow{display:flex;gap:12px;margin-bottom:32px;opacity:0;animation:fu .8s ease 1.2s forwards}
.csw{width:28px;height:28px;border-radius:50%;cursor:pointer;border:2.5px solid transparent;transition:transform .18s,border-color .18s;-webkit-tap-highlight-color:transparent}
.csw.on{border-color:#E8A15A;transform:scale(1.22)}
#gbtn{display:inline-flex;align-items:center;gap:8px;background:#E8A15A;color:#0B0B0D;font-size:13px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:15px 32px;border-radius:999px;border:none;cursor:pointer;opacity:0;animation:fu .8s ease 1.35s forwards;-webkit-tap-highlight-color:transparent;transition:background .15s,transform .1s}
#gbtn:active{transform:scale(.97);background:#F2B677}
@keyframes fu{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* HUD */
#hud{position:fixed;top:0;left:0;right:0;padding:max(14px,env(safe-area-inset-top)) 16px 12px;display:flex;justify-content:space-between;align-items:flex-start;z-index:500;pointer-events:none;display:none}
#hud.show{display:flex}
.pill{background:rgba(5,5,7,.72);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,.1);border-radius:12px}
#logo{padding:9px 14px}
#logo span{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:#E8A15A;font-weight:600}
#sbox{padding:7px 16px;text-align:right}
#spd{font-size:26px;font-weight:700;color:#fff;line-height:1;font-variant-numeric:tabular-nums}
#spu{font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.35);margin-top:1px}
#gear{position:fixed;top:50%;right:16px;transform:translateY(-50%);z-index:500;display:none;padding:10px 14px;text-align:center;pointer-events:none}
#gear.show{display:block}
#gl{font-size:24px;font-weight:700;color:#E8A15A;line-height:1}
#gs2{font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.3);margin-top:2px}

/* TAP PROMPT */
#tap-ui{position:fixed;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;z-index:400;pointer-events:none;gap:18px}
#tap-ui.show{display:flex}
#tap-ring{width:72px;height:72px;border:2px dashed rgba(232,161,90,.75);border-radius:50%;animation:tring 2s ease-in-out infinite}
@keyframes tring{0%,100%{transform:scale(1);opacity:.7}50%{transform:scale(1.14);opacity:1}}
#tap-badge{background:rgba(5,5,7,.78);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,.1);border-radius:999px;padding:10px 22px;display:flex;align-items:center;gap:10px}
#tdot{width:7px;height:7px;border-radius:50%;background:#E8A15A;animation:pulse 2s ease infinite;flex-shrink:0}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(232,161,90,.5)}50%{box-shadow:0 0 0 7px rgba(232,161,90,0)}}
#ttxt{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.85)}

/* Color panel */
#cpanel{position:fixed;top:50%;left:16px;transform:translateY(-50%);z-index:500;display:none;flex-direction:column;gap:10px}
#cpanel.show{display:flex}
.psw{width:34px;height:34px;border-radius:50%;cursor:pointer;border:2.5px solid transparent;transition:transform .15s,border-color .15s;-webkit-tap-highlight-color:transparent;box-shadow:0 2px 10px rgba(0,0,0,.5)}
.psw.on{border-color:#E8A15A;transform:scale(1.18)}

/* Joysticks */
#ctrl{position:fixed;inset:0;pointer-events:none;z-index:450;display:none}
#ctrl.show{display:block}
.cr{position:absolute;bottom:0;left:0;right:0;padding:0 28px calc(max(28px,env(safe-area-inset-bottom)) + 18px);display:flex;justify-content:space-between;align-items:flex-end}
.jw{pointer-events:auto;display:flex;flex-direction:column;align-items:center;gap:6px}
.jl{font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.3)}
.jb{width:118px;height:118px;border-radius:50%;background:rgba(5,5,7,.62);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1.5px solid rgba(255,255,255,.14);position:relative;touch-action:none;-webkit-tap-highlight-color:transparent}
.jk{width:46px;height:46px;border-radius:50%;position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);touch-action:none}
#jk1{background:#E8A15A;box-shadow:0 0 0 10px rgba(232,161,90,.12)}
#jk2{background:rgba(255,255,255,.88);box-shadow:0 0 0 10px rgba(255,255,255,.08)}
</style>
</head>
<body>

════════════════════════════════════ -->

  <a-camera gps-camera rotation-reader></a-camera>

        <a-box position="0 0 0.072" width="0.020" height="0.270" depth="0.028" color="#b5b5b5" metalness="0.9" roughness="0.1" rotation="0 0 144"></a-box>
        <a-cylinder position="0 0 0.075" radius="0.038" height="0.045" rotation="90 0 0" color="#888" metalness="0.9" roughness="0.1"></a-cylinder>
      </a-entity>
      <!-- WHEELS FR -->

<script>
/* ── AFRAME COMPONENT: gps-camera (needed by AR.js GPS mode) ── */
/* We register a minimal component to place car at fixed distance */
AFRAME.registerComponent('rotation-reader', {
  tick: function() {
    /* Used internally by AR.js — no action needed */
  }
});

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   COLOR
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
let chosenColor = '#1a1a1a';

function applyColor(hex) {
  ['b-main','b-cabin','b-hood','b-boot'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.setAttribute('color', hex);
  });
  ['sv-body','sv-cabin','sv-hood','sv-boot'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.setAttribute('fill', hex);
  });
}

document.querySelectorAll('.csw').forEach(sw => {
  sw.addEventListener('click', () => {
    document.querySelectorAll('.csw').forEach(s => { s.classList.remove('on'); s.style.borderColor='transparent'; });
    sw.classList.add('on'); sw.style.borderColor='#E8A15A';
    chosenColor = sw.dataset.c; applyColor(chosenColor);
  });
});
document.querySelectorAll('.psw').forEach(sw => {
  sw.addEventListener('click', () => {
    document.querySelectorAll('.psw').forEach(s => { s.classList.remove('on'); s.style.borderColor='transparent'; });
    sw.classList.add('on'); sw.style.borderColor='#E8A15A';
    applyColor(sw.dataset.c);
  });
});

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   GATE → BEGIN
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
document.getElementById('gbtn').addEventListener('click', () => {
  applyColor(chosenColor);
  const gate = document.getElementById('gate');
  gate.classList.add('hide');
  setTimeout(() => gate.style.display='none', 700);
  document.getElementById('hud').classList.add('show');
  document.getElementById('tap-ui').classList.add('show');
  document.getElementById('cpanel').classList.add('show');
  document.getElementById('ctrl').classList.add('show');
  document.getElementById('gear').classList.add('show');
});

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   TAP TO PLACE — places car 2m in
   front of camera at ground level
   using camera's current orientation
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
let placed = false;

function placeCar() {
  if (placed) return;
  placed = true;

  const cam = document.querySelector('a-camera');
  const rrEnt = document.getElementById('rr-entity');

  /* Get camera world position and rotation */
  const camObj = cam.object3D;
  const camPos = new THREE.Vector3();
  const camQuat = new THREE.Quaternion();
  camObj.getWorldPosition(camPos);
  camObj.getWorldQuaternion(camQuat);

  /* Project 2m forward in camera's look direction, at y=0 */
  const forward = new THREE.Vector3(0, 0, -1);
  forward.applyQuaternion(camQuat);
  forward.y = 0;
  forward.normalize();

  const placeX = camPos.x + forward.x * 2;
  const placeZ = camPos.z + forward.z * 2;

  rrEnt.setAttribute('position', `${placeX.toFixed(3)} 0 ${placeZ.toFixed(3)}`);
  rrEnt.setAttribute('visible', 'true');

  /* Face car toward camera */
  const rrGroup = document.getElementById('rr');
  const dx = camPos.x - placeX;
  const dz = camPos.z - placeZ;
  const faceAngle = Math.atan2(dx, dz) * 180 / Math.PI;
  rrGroup.setAttribute('rotation', `0 ${faceAngle} 0`);
  carAngle = faceAngle * Math.PI / 180;

  document.getElementById('tap-ui').classList.remove('show');
}

document.addEventListener('touchend', e => {
  if (!document.getElementById('ctrl').classList.contains('show')) return;
  const t = e.changedTouches[0];
  const j1 = document.getElementById('jb1').getBoundingClientRect();
  const j2 = document.getElementById('jb2').getBoundingClientRect();
  const inJ = (x,y,r) => x>=r.left&&x<=r.right&&y>=r.top&&y<=r.bottom;
  if (!inJ(t.clientX,t.clientY,j1) && !inJ(t.clientX,t.clientY,j2)) placeCar();
}, {passive:true});

document.addEventListener('click', () => {
  if (document.getElementById('ctrl').classList.contains('show')) placeCar();
}, {passive:true});

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   JOYSTICKS
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
function makeJoy(bid,kid){
  const base=document.getElementById(bid),knob=document.getElementById(kid);
  let v={x:0,y:0},on=false;
  function upd(cx,cy){
    const r=base.getBoundingClientRect();
    const dx=(cx-r.left-r.width/2)/(r.width/2);
    const dy=(cy-r.top-r.height/2)/(r.height/2);
    const l=Math.hypot(dx,dy);v.x=l>1?dx/l:dx;v.y=l>1?dy/l:dy;
    knob.style.transform=`translate(calc(-50% + ${v.x*34}px),calc(-50% + ${v.y*34}px))`;
  }
  function reset(){on=false;v.x=0;v.y=0;knob.style.transform='translate(-50%,-50%)';}
  base.addEventListener('touchstart',e=>{on=true;upd(e.touches[0].clientX,e.touches[0].clientY);e.preventDefault();},{passive:false});
  base.addEventListener('touchmove', e=>{if(on)upd(e.touches[0].clientX,e.touches[0].clientY);e.preventDefault();},{passive:false});
  base.addEventListener('touchend',  reset,{passive:true});
  base.addEventListener('touchcancel',reset,{passive:true});
  return{get:()=>v,on:()=>on};
}
const TJ=makeJoy('jb1','jk1');
const SJ=makeJoy('jb2','jk2');
const K={};
document.addEventListener('keydown',e=>K[e.key]=true);
document.addEventListener('keyup',  e=>K[e.key]=false);

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   DRIVE
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
let speed=0, carAngle=0, wheelSpin=0;
const MAX=0.020, ACCEL=0.00065, FRICTION=0.936, STEER=0.036;

function loop(){
  requestAnimationFrame(loop);
  if(!placed) return;

  const tv=TJ.get(),sv=SJ.get();
  const gas=TJ.on()?Math.max(0,-tv.y):(K['ArrowUp']  ||K['w']?1:0);
  const rev=TJ.on()?Math.max(0, tv.y):(K['ArrowDown']||K['s']?1:0);
  const str=SJ.on()?sv.x             :(K['ArrowRight']||K['d']?1:0)-(K['ArrowLeft']||K['a']?1:0);

  if     (gas>0) speed=Math.min( MAX,speed+ACCEL*gas);
  else if(rev>0) speed=Math.max(-MAX*.5,speed-ACCEL*rev);
  else           speed*=FRICTION;

  const sf=Math.min(1,Math.abs(speed)/MAX);
  if(Math.abs(speed)>0.0002) carAngle-=str*STEER*sf*Math.sign(speed);

  /* Move car in world space — stays on ground regardless of where camera points */
  const ent = document.getElementById('rr-entity');
  const pos = ent.getAttribute('position');
  const nx = (pos.x + Math.sin(carAngle)*speed);
  const nz = (pos.z + Math.cos(carAngle)*speed);
  ent.setAttribute('position',`${nx.toFixed(4)} 0 ${nz.toFixed(4)}`);

  const rr = document.getElementById('rr');
  rr.setAttribute('rotation',`0 ${(-carAngle*180/Math.PI).toFixed(2)} 0`);

  wheelSpin += speed*440;
  ['wFL','wFR','wRL','wRR'].forEach(id=>{
    const w=document.getElementById(id);
    if(w&&w.children[0]) w.children[0].setAttribute('rotation',`${wheelSpin.toFixed(1)} 0 0`);
  });

  const kmh=Math.round(Math.abs(speed)/MAX*160);
  document.getElementById('spd').textContent=kmh;
  document.getElementById('gl').textContent=speed>0.001?'D':speed<-0.001?'R':'N';
  document.getElementById('gl').style.color=speed<-0.001?'#ff6b6b':'#E8A15A';
}

document.querySelector('a-scene').addEventListener('loaded',()=>{ loop(); },{once:true});
</script>
